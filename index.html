<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamesense | Rejestracja</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="background-glow"></div>
    <div class="container">
        <div class="card">
            <div class="rainbow-line"></div>
            <header>
                <h1>GAMESENSE<span>.PUB</span></h1>
                <p>Zarejestruj swój dostęp do klienta</p>
            </header>

            <form id="regForm">
                <div class="input-group">
                    <label for="username">Minecraft Username</label>
                    <input type="text" id="username" placeholder="Twój nick w grze..." required>
                    <small>Musi być identyczny z tym w Minecraft!</small>
                </div>

                <div class="input-group">
                    <label for="displayName">Display Name</label>
                    <input type="text" id="displayName" placeholder="Nick w menu (np. Admin)..." required>
                    <small>To pokaże się w prawym górnym rogu.</small>
                </div>

                <button type="submit" id="submitBtn">
                    <span class="btn-text">ZAREJESTRUJ DOSTĘP</span>
                    <div class="loader"></div>
                </button>
            </form>

            <div id="message" class="message"></div>
        </div>
        <footer>
            &copy; 2026 GAMESENSE Technology. Wszystkie prawa zastrzeżone.
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
